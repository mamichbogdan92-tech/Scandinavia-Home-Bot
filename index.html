<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Конструктор — Scandinavia Home</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/examples/js/controls/OrbitControls.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f0f0f0; height: 100vh; overflow: hidden; }
    #container { width: 100%; height: 100vh; }
    #ui {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      max-width: 340px;
      z-index: 100;
    }
    h1 { margin: 0 0 10px; color: #1b5e20; font-size: 26px; }
    select, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 15px;
      border-radius: 10px;
      border: none;
    }
    button { background: #4CAF50; color: white; cursor: pointer; font-weight: 600; }
    #price { font-size: 20px; font-weight: bold; color: #1b5e20; text-align: center; margin: 15px 0; background: rgba(76,175,80,0.15); padding: 12px; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="ui">
    <h1>Собери свой дом 3D</h1>
    <select id="style">
      <option value="23500">Modern — 23 500 грн/м²</option>
      <option value="24000">Scandinavia — 24 000 грн/м²</option>
      <option value="24500">BarnHouse — 24 500 грн/м²</option>
    </select>
    <button id="addTerrace">+ Терраса (+18 м²)</button>
    <button id="addWindow">+ Окно (+3 м²)</button>
    <button id="addDoor">+ Дверь (+2 м²)</button>
    <button id="changeWalls">🎨 Цвет стен</button>
    <button id="changeRoof">🏠 Цвет крыши</button>
    <button id="sendConfig">Отправить менеджеру</button>
    <div id="price">Площадь: 50 м² | Цена: 1 150 000 грн</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp || {};
    if (tg.ready) tg.ready();
    if (tg.expand) tg.expand();

    let basePrice = 23500;
    let area = 50;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe0f7fa);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 6, 18);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('container').appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.DirectionalLight(0xffffff, 1.8).position.set(10, 15, 10));
    scene.add(new THREE.AmbientLight(0xffffff, 1));

    // Стены
    const walls = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 10), new THREE.MeshStandardMaterial({ color: 0xf5f5f5 }));
    walls.position.y = 2.5;
    scene.add(walls);

    // Крыша
    const roof = new THREE.Mesh(new THREE.ConeGeometry(9, 4, 4), new THREE.MeshStandardMaterial({ color: 0x8b0000 }));
    roof.position.y = 7.5;
    roof.rotation.y = Math.PI / 4;
    scene.add(roof);

    // Терраса
    const terrace = new THREE.Mesh(new THREE.BoxGeometry(12, 0.4, 7), new THREE.MeshStandardMaterial({ color: 0x8b4513 }));
    terrace.position.set(0, 0.2, 9);
    terrace.visible = false;
    scene.add(terrace);

    // Окно
    const windowMesh = new THREE.Mesh(new THREE.BoxGeometry(1.8, 2.2, 0.2), new THREE.MeshStandardMaterial({ color: 0x87ceeb }));
    windowMesh.position.set(3, 3, 5.1);
    windowMesh.visible = false;
    scene.add(windowMesh);

    // Дверь
    const door = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.6, 0.2), new THREE.MeshStandardMaterial({ color: 0x5d4037 }));
    door.position.set(-3, 1.3, 5.1);
    door.visible = false;
    scene.add(door);

    // Земля
    scene.add(new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshStandardMaterial({ color: 0x3d8c40 })).rotateX(-Math.PI / 2));

    const priceEl = document.getElementById('price');

    function updatePrice() {
      let extra = (terrace.visible ? 18 : 0) + (windowMesh.visible ? 3 : 0) + (door.visible ? 2 : 0);
      area = 50 + extra;
      const total = Math.round(area * basePrice);
      priceEl.innerText = `Площадь: ${area} м² | Цена: ${total.toLocaleString()} грн`;
    }
    updatePrice();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Кнопки
    document.getElementById('addTerrace').onclick = () => { terrace.visible = !terrace.visible; updatePrice(); };
    document.getElementById('addWindow').onclick = () => { windowMesh.visible = !windowMesh.visible; updatePrice(); };
    document.getElementById('addDoor').onclick = () => { door.visible = !door.visible; updatePrice(); };
    document.getElementById('changeWalls').onclick = () => { walls.material.color.set(Math.random() * 0xffffff); };
    document.getElementById('changeRoof').onclick = () => { roof.material.color.set(Math.random() * 0xffffff); };

    document.getElementById('style').onchange = (e) => {
      basePrice = parseInt(e.target.value);
      updatePrice();
    };

    document.getElementById('sendConfig').onclick = () => {
      const config = {
        style: document.getElementById('style').options[document.getElementById('style').selectedIndex].text,
        area: area,
        price: area * basePrice,
        terrace: terrace.visible,
        windows: windowMesh.visible,
        door: door.visible
      };
      if (tg.sendData) {
        tg.sendData(JSON.stringify(config));
        tg.close();
      } else {
        alert("Конфиг отправлен!\n" + JSON.stringify(config, null, 2));
      }
    };
  </script>
</body>
</html>
