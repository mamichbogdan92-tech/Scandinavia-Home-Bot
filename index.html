<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Собери свой дом 3D</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/examples/js/controls/OrbitControls.min.js"></script>
  <style>
    body { margin: 0; background: #000; height: 100vh; overflow: hidden; font-family: Arial; color: white; }
    #container { width: 100%; height: 100vh; }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      padding: 15px;
      border-radius: 12px;
      z-index: 100;
    }
    button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: #333;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #price { font-size: 18px; font-weight: bold; margin: 15px 0; color: lime; }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="ui">
    <h2>Собери свой дом 3D</h2>
    <button id="addTerrace">+ Терраса</button>
    <button id="changeColor">Сменить цвет</button>
    <div id="price">Площадь: 50 м² | Цена: 1 150 000 грн</div>
  </div>

  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000); // чёрный фон, как ты просил

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 12); // ближе и выше

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('container').appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Большой белый дом (стены)
    const walls = new THREE.Mesh(
      new THREE.BoxGeometry(10, 6, 10),
      new THREE.MeshBasicMaterial({ color: 0xffffff }) // белые стены, без света
    );
    walls.position.y = 3;
    scene.add(walls);

    // Красная крыша
    const roof = new THREE.Mesh(
      new THREE.ConeGeometry(9, 4, 4),
      new THREE.MeshBasicMaterial({ color: 0xff0000 })
    );
    roof.position.y = 8;
    roof.rotation.y = Math.PI / 4;
    scene.add(roof);

    // Терраса
    const terrace = new THREE.Mesh(
      new THREE.BoxGeometry(12, 0.4, 7),
      new THREE.MeshBasicMaterial({ color: 0x555555 })
    );
    terrace.position.set(0, 0.2, 9);
    terrace.visible = false;
    scene.add(terrace);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Кнопки
    document.getElementById('addTerrace').onclick = () => {
      terrace.visible = !terrace.visible;
    };

    document.getElementById('changeColor').onclick = () => {
      walls.material.color.set(Math.random() * 0xffffff);
    };

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
