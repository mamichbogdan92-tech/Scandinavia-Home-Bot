<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Собери свой дом 3D — Scandinavia Home</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/examples/js/controls/OrbitControls.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f4f4; height: 100vh; overflow: hidden; }
    #container { width: 100%; height: 100vh; }
    #ui {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      max-width: 280px;
      z-index: 100;
    }
    h1 { margin: 0 0 10px; color: #333; font-size: 24px; }
    button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }
    #addTerrace { background: #4CAF50; }
    #changeWalls { background: #2196F3; }
    #changeRoof { background: #f44336; }
    #price { font-size: 18px; font-weight: bold; margin: 15px 0; color: #333; text-align: center; }
    #status { color: #4CAF50; font-size: 14px; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="ui">
    <h1>Собери свой дом 🏠</h1>
    <p id="status">Крути пальцем/мышкой • Добавляй модули</p>
    <button id="addTerrace">+ Терраса</button>
    <button id="changeWalls">🎨 Цвет стен</button>
    <button id="changeRoof">🏠 Цвет крыши</button>
    <div id="price">Площадь: 50 м² | Цена: 1 150 000 грн</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.MainButton.setText("Отправить менеджеру");
    tg.MainButton.show();

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe0f7fa);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 6, 18);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('container').appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 10;
    controls.maxDistance = 40;

    // Свет
    scene.add(new THREE.DirectionalLight(0xffffff, 1.8).position.set(12, 20, 10));
    scene.add(new THREE.AmbientLight(0xffffff, 0.9));

    // Стены
    const walls = new THREE.Mesh(
      new THREE.BoxGeometry(10, 5, 10),
      new THREE.MeshStandardMaterial({ color: 0xf5f5f5 })
    );
    walls.position.y = 2.5;
    scene.add(walls);

    // Крыша
    const roof = new THREE.Mesh(
      new THREE.ConeGeometry(9, 4, 4),
      new THREE.MeshStandardMaterial({ color: 0x8b0000 })
    );
    roof.position.y = 7.5;
    roof.rotation.y = Math.PI / 4;
    scene.add(roof);

    // Терраса
    const terrace = new THREE.Mesh(
      new THREE.BoxGeometry(12, 0.4, 7),
      new THREE.MeshStandardMaterial({ color: 0x8b4513 })
    );
    terrace.position.set(0, 0.2, 9);
    terrace.visible = false;
    scene.add(terrace);

    // Земля
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: 0x3d8c40 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.01;
    scene.add(ground);

    let area = 50;
    const pricePerM2 = 23000;
    const priceEl = document.getElementById('price');

    function updatePrice() {
      area = 50 + (terrace.visible ? 18 : 0);
      priceEl.innerText = `Площадь: ${area} м² | Цена: ${(area * pricePerM2).toLocaleString()} грн`;
    }
    updatePrice();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Кнопки
    document.getElementById('addTerrace').onclick = () => {
      terrace.visible = true;
      updatePrice();
      tg.showAlert("Терраса добавлена ✅");
    };

    document.getElementById('changeWalls').onclick = () => {
      walls.material.color.set(Math.random() * 0xffffff);
    };

    document.getElementById('changeRoof').onclick = () => {
      roof.material.color.set(Math.random() * 0xffffff);
    };

    // Отправка
    document.getElementById('sendConfig').onclick = () => {
      const config = {
        wallsColor: '#' + walls.material.color.getHexString(),
        roofColor: '#' + roof.material.color.getHexString(),
        terrace: terrace.visible,
        area: area,
        price: area * pricePerM2
      };
      tg.sendData(JSON.stringify(config));
      tg.close();
    };

    tg.MainButton.onClick(() => {
      const config = {
        wallsColor: '#' + walls.material.color.getHexString(),
        roofColor: '#' + roof.material.color.getHexString(),
        terrace: terrace.visible,
        area: area,
        price: area * pricePerM2
      };
      tg.sendData(JSON.stringify(config));
    });
  </script>
</body>
</html>
