<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест 3D — красный кубик</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/examples/js/controls/OrbitControls.min.js"></script>
  <style>
    body { margin: 0; height: 100vh; overflow: hidden; background: #111; color: white; font-family: Arial; text-align: center; }
    #container { width: 100%; height: 100vh; }
    #status { position: absolute; top: 20px; left: 20px; color: lime; font-size: 22px; font-weight: bold; z-index: 100; }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="status">Загрузка теста...</div>

  <script>
    const status = document.getElementById('status');
    const tg = window.Telegram.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    status.innerText = "Проверка THREE...";

    if (typeof THREE === 'undefined') {
      status.innerText = "THREE НЕ загружен!";
      status.style.color = "red";
      return;
    }

    status.innerText = "THREE есть! Создаём красный кубик...";

    try {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000022);

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;  // ← кубик точно в центре

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.getElementById('container').appendChild(renderer.domElement);

      // Красный кубик — огромный, яркий, без света
      const geometry = new THREE.BoxGeometry(4, 4, 4);
      const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
      const cube = new THREE.Mesh(geometry, material);
      scene.add(cube);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      function animate() {
        requestAnimationFrame(animate);
        cube.rotation.x += 0.015;
        cube.rotation.y += 0.02;
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      status.innerText = "КРАСНЫЙ КУБИК ДОЛЖЕН БЫТЬ ВИДЕН! Крути пальцем.";
      status.style.color = "lime";
    } catch (e) {
      status.innerText = "Ошибка рендера: " + e.message;
      status.style.color = "red";
    }
  </script>
</body>
</html>
