<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>МойДом — Конструктор</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, sans-serif; background:#1e1e1e; color:#eee; height:100vh; overflow:hidden; }
    
    #topbar { position:absolute; top:0; left:0; right:0; height:60px; background:#252525; display:flex; align-items:center; padding:0 20px; border-bottom:1px solid #444; z-index:300; }
    #logo { font-size:24px; font-weight:bold; color:#4fc3f7; }
    .tabs { display:flex; gap:8px; margin-left:30px; }
    .tab { padding:10px 24px; background:#333; border-radius:8px; cursor:pointer; font-size:15px; }
    .tab.active { background:#4fc3f7; color:#111; font-weight:600; }

    #leftbar { position:absolute; left:0; top:60px; bottom:0; width:290px; background:#252525; border-right:1px solid #444; padding:15px; overflow-y:auto; z-index:200; }
    #search { width:100%; padding:12px; background:#333; border:none; border-radius:8px; color:white; margin-bottom:20px; }
    .category h3 { margin:18px 0 10px; color:#aaa; font-size:14px; }
    .items { display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; }
    .item { aspect-ratio:1; background:#333; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:13px; cursor:pointer; transition:0.2s; }
    .item:hover { background:#4fc3f7; color:#111; transform:scale(1.05); }

    #canvasContainer { position:absolute; left:290px; top:60px; right:0; bottom:0; background:#0f0f0f; }
    #rightbar { position:absolute; right:0; top:60px; bottom:0; width:65px; background:#252525; border-left:1px solid #444; display:flex; flex-direction:column; align-items:center; padding-top:20px; gap:18px; z-index:200; }
    .tool { font-size:26px; cursor:pointer; padding:12px; border-radius:10px; }
    .tool:hover { background:#3a3a3a; }

    #status { position:absolute; bottom:15px; left:310px; background:rgba(0,0,0,0.7); padding:8px 16px; border-radius:8px; font-size:13px; z-index:100; }
</style>
</head>
<body>

<div id="topbar">
    <div id="logo">🏠 МойДом</div>
    <div class="tabs">
        <div class="tab active" id="tab2d" onclick="switchMode(2)">2D</div>
        <div class="tab" id="tab3d" onclick="switchMode(3)">3D</div>
    </div>
    <div style="flex:1"></div>
    <button onclick="saveProject()" style="padding:9px 20px; background:#4fc3f7; color:#111; border:none; border-radius:8px; font-weight:600; margin-right:10px;">Сохранить</button>
    <button onclick="clearAll()" style="padding:9px 16px; background:#c33; color:white; border:none; border-radius:8px;">Очистить</button>
</div>

<div id="leftbar">
    <input type="text" id="search" placeholder="Поиск...">
    <div class="category">
        <h3>Элементы</h3>
        <div class="items">
            <div class="item" onclick="setTool('wall')">🧱<br>Стена</div>
            <div class="item" onclick="setTool('window')">🪟<br>Окно</div>
            <div class="item" onclick="setTool('door')">🚪<br>Дверь</div>
        </div>
    </div>
    <div class="category">
        <h3>Мебель</h3>
        <div class="items">
            <div class="item" onclick="addFurniture('bed')">🛏️<br>Кровать</div>
            <div class="item" onclick="addFurniture('sofa')">🛋️<br>Диван</div>
            <div class="item" onclick="addFurniture('table')">🪑<br>Стол</div>
        </div>
    </div>
</div>

<div id="rightbar">
    <div class="tool" onclick="deleteSelected()">🗑️</div>
    <div class="tool" onclick="rotateSelected()">⟳</div>
</div>

<div id="canvasContainer"></div>
<div id="status">Режим: 2D • Стен: 0 • Комнат: 0</div>

<script src="https://cdn.jsdelivr.net/npm/konva@9/konva.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ====================== Глобальные ======================
let stage, layer, currentMode = 2;
let currentTool = 'wall';
let selected = null;
let walls = [];
let rooms = [];
let threeScene, threeCamera, threeRenderer, threeControls;

// ====================== 2D ======================
function init2D() {
    const container = document.getElementById('canvasContainer');
    container.innerHTML = '<div id="konva"></div>';
    
    stage = new Konva.Stage({ container: 'konva', width: container.clientWidth, height: container.clientHeight });
    layer = new Konva.Layer();
    stage.add(layer);

    let drawing = false;
    let startPoint = null;

    stage.on('mousedown', e => {
        if (currentTool !== 'wall' || currentMode !== 2) return;
        drawing = true;
        const pos = stage.getPointerPosition();
        startPoint = snap(pos.x, pos.y);
    });

    stage.on('mouseup', e => {
        if (!drawing || !startPoint) return;
        const end = snap(stage.getPointerPosition().x, stage.getPointerPosition().y);
        
        const wall = new Konva.Line({
            points: [startPoint.x, startPoint.y, end.x, end.y],
            stroke: '#888',
            strokeWidth: 22,
            lineCap: 'round',
            lineJoin: 'round',
            draggable: true
        });
        
        wall.userData = {type: 'wall'};
        wall.on('click', () => { selectItem(wall); if (currentTool === 'window' || currentTool === 'door') addOpeningOnWall(wall, currentTool); });
        
        layer.add(wall);
        walls.push(wall);
        layer.draw();
        
        drawing = false;
        startPoint = null;
        detectRooms();
        updateStatus();
    });

    stage.on('click', e => {
        if (e.target === stage) deselect();
    });
}

function snap(x, y) {
    const g = 20;
    return { x: Math.round(x/g)*g, y: Math.round(y/g)*g };
}

// Простое определение комнат (замыкание контуров)
function detectRooms() {
    rooms.forEach(r => r.destroy());
    rooms = [];
    
    // Очень упрощённая версия: если есть хотя бы 3-4 стены — создаём пример комнаты
    if (walls.length >= 3) {
        const roomPoly = new Konva.Line({
            points: [250,250, 650,250, 650,550, 250,550],
            fill: 'rgba(100,180,255,0.15)',
            stroke: 'transparent',
            closed: true
        });
        layer.add(roomPoly);
        rooms.push(roomPoly);
        layer.draw();
    }
}

// Добавление проёма на стену
function addOpeningOnWall(wall, type) {
    const points = wall.points();
    const midX = (points[0] + points[2]) / 2;
    const midY = (points[1] + points[3]) / 2;
    
    const opening = new Konva.Rect({
        x: midX - 20,
        y: midY - 8,
        width: 40,
        height: 16,
        fill: type === 'window' ? '#88ddff' : '#8B5A2B',
        rotation: wall.rotation()
    });
    layer.add(opening);
    layer.draw();
}

// Мебель
function addFurniture(type) {
    const map = {bed:'🛏️', sofa:'🛋️', table:'🪑'};
    const f = new Konva.Text({
        x: 400 + Math.random()*200,
        y: 300 + Math.random()*150,
        text: map[type] || '📦',
        fontSize: 50,
        draggable: true
    });
    f.on('click', () => selectItem(f));
    layer.add(f);
    layer.draw();
}

// Управление
function selectItem(item) { deselect(); selected = item; layer.draw(); }
function deselect() { selected = null; layer.draw(); }
function deleteSelected() { if (selected) { selected.destroy(); walls = walls.filter(w => w !== selected); layer.draw(); deselect(); updateStatus(); }}
function rotateSelected() { if (selected) { selected.rotation(selected.rotation() + 90); layer.draw(); }}

// ====================== 3D ======================
function init3D() {
    const container = document.getElementById('canvasContainer');
    container.innerHTML = '';
    
    threeScene = new THREE.Scene();
    threeScene.background = new THREE.Color(0x111111);
    
    threeCamera = new THREE.PerspectiveCamera(60, container.clientWidth/container.clientHeight, 0.1, 1000);
    threeCamera.position.set(12, 15, 18);
    
    threeRenderer = new THREE.WebGLRenderer({antialias:true});
    threeRenderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(threeRenderer.domElement);
    
    threeControls = new THREE.OrbitControls(threeCamera, threeRenderer.domElement);
    threeControls.enableDamping = true;

    // Свет и пол
    threeScene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dir = new THREE.DirectionalLight(0xffffff, 1);
    dir.position.set(10,20,15);
    threeScene.add(dir);

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(40,40), new THREE.MeshStandardMaterial({color:0x555555}));
    floor.rotation.x = -Math.PI/2;
    threeScene.add(floor);

    // Перенос стен из 2D в 3D
    walls.forEach(wall => {
        const pts = wall.points();
        const length = Math.hypot(pts[2]-pts[0], pts[3]-pts[1]) / 20; // масштаб
        const angle = Math.atan2(pts[3]-pts[1], pts[2]-pts[0]);
        
        const wallMesh = new THREE.Mesh(
            new THREE.BoxGeometry(length, 3, 0.3),
            new THREE.MeshStandardMaterial({color: 0xaaaaaa})
        );
        wallMesh.position.set((pts[0]+pts[2])/40 - 10, 1.5, (pts[1]+pts[3])/40 - 10);
        wallMesh.rotation.y = -angle;
        threeScene.add(wallMesh);
    });

    function animate() {
        requestAnimationFrame(animate);
        threeControls.update();
        threeRenderer.render(threeScene, threeCamera);
    }
    animate();
}

// ====================== Общее ======================
function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(mode===2 ? 'tab2d' : 'tab3d').classList.add('active');
    
    if (mode === 2) init2D();
    else init3D();
}

function setTool(tool) {
    currentTool = tool;
}

function updateStatus() {
    document.getElementById('status').innerText = `Режим: ${currentMode===2?'2D':'3D'} • Стен: ${walls.length} • Комнат: ${rooms.length}`;
}

function clearAll() {
    if (confirm('Очистить проект полностью?')) {
        walls = []; rooms = [];
        if (stage) { layer.destroyChildren(); layer.draw(); }
        updateStatus();
    }
}

function saveProject() {
    alert('Проект сохранён (в localStorage — можно расширить)');
    // localStorage.setItem('project', JSON.stringify({walls: walls.map(w => w.points())}));
}

// Запуск
window.onload = () => {
    init2D();
    updateStatus();

    // Стартовый пример
    setTimeout(() => {
        const w1 = new Konva.Line({points:[200,200,700,200], stroke:'#888', strokeWidth:22, draggable:true});
        const w2 = new Konva.Line({points:[700,200,700,550], stroke:'#888', strokeWidth:22, draggable:true});
        const w3 = new Konva.Line({points:[700,550,200,550], stroke:'#888', strokeWidth:22, draggable:true});
        const w4 = new Konva.Line({points:[200,550,200,200], stroke:'#888', strokeWidth:22, draggable:true});
        layer.add(w1,w2,w3,w4);
        walls.push(w1,w2,w3,w4);
        layer.draw();
        detectRooms();
        updateStatus();
    }, 300);
};

window.addEventListener('resize', () => {
    if (stage && currentMode === 2) {
        stage.width(document.getElementById('canvasContainer').clientWidth);
        stage.height(document.getElementById('canvasContainer').clientHeight);
    }
});
</script>
</body>
</html>
