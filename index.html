<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Симулятор Постройки — Scandinavia Home</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/examples/js/controls/OrbitControls.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial; background: #111; height: 100vh; overflow: hidden; color: white; }
    #container { width: 100%; height: 100vh; }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.85);
      padding: 20px;
      border-radius: 16px;
      width: 340px;
      z-index: 100;
    }
    h1 { text-align: center; margin: 0 0 15px; font-size: 26px; }
    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      background: #333;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }
    button:hover { background: #555; }
    #price { font-size: 21px; font-weight: bold; color: lime; text-align: center; margin: 15px 0; }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="ui">
    <h1>3D Симулятор Постройки</h1>
    <select id="style">
      <option value="23500">Modern — 23 500 грн/м²</option>
      <option value="24000">Scandinavia — 24 000 грн/м²</option>
      <option value="24500">BarnHouse — 24 500 грн/м²</option>
    </select>
    <button id="addWall">🧱 Добавить стену</button>
    <button id="addRoof">🏠 Добавить крышу</button>
    <button id="addTerrace">🌳 Добавить террасу</button>
    <button id="addWindow">🪟 Добавить окно</button>
    <button id="addDoor">🚪 Добавить дверь</button>
    <button id="changeColor">🎨 Сменить цвет дома</button>
    <button id="sendConfig" style="background:#4CAF50;">Отправить менеджеру</button>
    <div id="price">Площадь: 50 м² | Цена: 1 150 000 грн</div>
  </div>

  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 25);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('container').appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.DirectionalLight(0xffffff, 1.8).position.set(10, 20, 10));
    scene.add(new THREE.AmbientLight(0xffffff, 1));

    // Стены
    let walls = new THREE.Mesh(new THREE.BoxGeometry(12, 7, 12), new THREE.MeshStandardMaterial({ color: 0xffffff }));
    walls.position.y = 3.5;
    scene.add(walls);

    // Крыша
    let roof = new THREE.Mesh(new THREE.ConeGeometry(11, 5, 4), new THREE.MeshStandardMaterial({ color: 0xb22222 }));
    roof.position.y = 9.5;
    roof.rotation.y = Math.PI / 4;
    scene.add(roof);

    // Терраса
    let terrace = new THREE.Mesh(new THREE.BoxGeometry(14, 0.4, 8), new THREE.MeshStandardMaterial({ color: 0x8b4513 }));
    terrace.position.set(0, 0.2, 11);
    terrace.visible = false;
    scene.add(terrace);

    let area = 50;
    let basePrice = 23500;
    const priceEl = document.getElementById('price');

    function updatePrice() {
      area = 50 + (terrace.visible ? 18 : 0);
      priceEl.innerText = `Площадь: ${area} м² | Цена: ${(area * basePrice).toLocaleString()} грн`;
    }
    updatePrice();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Кнопки
    document.getElementById('addWall').onclick = () => { walls.scale.y += 0.2; area += 12; updatePrice(); };
    document.getElementById('addRoof').onclick = () => { roof.visible = true; area += 8; updatePrice(); };
    document.getElementById('addTerrace').onclick = () => { terrace.visible = true; area += 18; updatePrice(); };
    document.getElementById('addWindow').onclick = () => { area += 3; updatePrice(); };
    document.getElementById('addDoor').onclick = () => { area += 2; updatePrice(); };
    document.getElementById('changeColor').onclick = () => {
      walls.material.color.set(Math.random() * 0xffffff);
      roof.material.color.set(Math.random() * 0xffffff);
    };

    document.getElementById('style').onchange = (e) => {
      basePrice = parseInt(e.target.value);
      updatePrice();
    };

    document.getElementById('sendConfig').onclick = () => {
      alert(`✅ Дом построен и отправлен менеджеру!\nПлощадь: ${area} м²\nЦена: ${(area * basePrice).toLocaleString()} грн`);
    };

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
