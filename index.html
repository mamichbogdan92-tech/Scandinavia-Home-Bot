<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Симулятор постройки дома</title>

<style>
body{
font-family:Arial;
background:#e8eef7;
text-align:center;
}

h1{
margin-top:20px;
}

#toolbar{
margin:15px;
}

button{
padding:10px 15px;
margin:5px;
font-size:16px;
cursor:pointer;
}

#canvas{
width:900px;
height:500px;
margin:auto;
background:white;
border:3px solid #333;
position:relative;
overflow:hidden;
}

.element{
position:absolute;
cursor:move;
}

.wall{
width:120px;
height:20px;
background:#777;
}

.window{
width:60px;
height:60px;
background:#87ceeb;
border:4px solid #555;
}

.door{
width:60px;
height:100px;
background:#8b4513;
}

</style>
</head>

<body>

<h1>Симулятор постройки дома</h1>

<div id="toolbar">
<button onclick="setTool('wall')">Стена</button>
<button onclick="setTool('window')">Окно</button>
<button onclick="setTool('door')">Дверь</button>
</div>

<div id="canvas"></div>

<script>

let currentTool = "wall";
let canvas = document.getElementById("canvas");

function setTool(tool){
currentTool = tool;
}

canvas.addEventListener("click", function(e){

let rect = canvas.getBoundingClientRect();
let x = e.clientX - rect.left;
let y = e.clientY - rect.top;

let el = document.createElement("div");
el.classList.add("element");
el.classList.add(currentTool);

el.style.left = x + "px";
el.style.top = y + "px";

makeDraggable(el);

canvas.appendChild(el);

});

function makeDraggable(el){

let offsetX, offsetY;

el.addEventListener("mousedown", function(e){

offsetX = e.offsetX;
offsetY = e.offsetY;

function move(e){

let rect = canvas.getBoundingClientRect();

el.style.left = (e.clientX - rect.left - offsetX) + "px";
el.style.top = (e.clientY - rect.top - offsetY) + "px";

}

document.addEventListener("mousemove", move);

document.addEventListener("mouseup", function(){
document.removeEventListener("mousemove", move);
},{once:true});

});

}

</script>

</body>
</html>
