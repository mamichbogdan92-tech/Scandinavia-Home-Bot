<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Scandi Home 3D Конструктор</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/examples/js/controls/OrbitControls.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f0f0f0; height: 100vh; overflow: hidden; text-align: center; }
    #container { width: 100%; height: 70vh; background: #e0f7fa; position: relative; }
    #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #333; font-size: 20px; max-width: 80%; display: none; }
    h1 { margin: 10px 0 5px; color: #333; }
    p { margin: 0 0 15px; color: #555; }
    button { padding: 12px 24px; font-size: 16px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; color: white; }
    #changeColor { background: #2196F3; }
    #sendConfig { background: #4CAF50; }
  </style>
</head>
<body>
  <h1>Собери свой дом 🏠</h1>
  <p>Загрузка 3D... Крути кубик пальцем/мышкой.</p>
  <div id="container">
    <div id="status">Загрузка THREE...</div>
  </div>
  <div>
    <button id="changeColor">Сменить цвет дома</button>
    <button id="sendConfig">Готово — отправить менеджеру</button>
  </div>

  <script>
    const status = document.getElementById('status');
    status.style.display = 'block';

    if (typeof THREE === 'undefined') {
      status.innerText = 'Ошибка: THREE не загружен. Проверь интернет или открой на телефоне.';
    } else {
      status.innerText = 'THREE загружен! Запускаем 3D...';
      try {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe0f7fa);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.7);
        document.getElementById('container').appendChild(renderer.domElement);

        const geometry = new THREE.BoxGeometry(2, 2, 2);
        let material = new THREE.MeshStandardMaterial({ color: 0xff9800 });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        scene.add(new THREE.DirectionalLight(0xffffff, 1).position.set(5, 5, 5));
        scene.add(new THREE.AmbientLight(0x404040));

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
          requestAnimationFrame(animate);
          cube.rotation.y += 0.005;
          controls.update();
          renderer.render(scene, camera);
        }
        animate();

        status.innerText = '3D готов! Крути кубик.';
        status.style.color = 'green';

        document.getElementById('changeColor').onclick = () => {
          material.color.set(Math.random() * 0xffffff);
        };

        document.getElementById('sendConfig').onclick = () => {
          const tg = window.Telegram.WebApp;
          if (tg) {
            tg.sendData("Дом готов! Цвет: #" + material.color.getHexString() + ", Площадь ~50 м²");
            tg.close();
          }
        };
      } catch (e) {
        status.innerText = 'Ошибка рендера: ' + e.message;
      }
    }
  </script>
</body>
</html>
