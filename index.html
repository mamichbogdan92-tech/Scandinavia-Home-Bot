<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тест 3D</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="three.min.js"></script>
  <script src="OrbitControls.min.js"></script>
  <style>
    body { margin: 0; height: 100vh; overflow: hidden; background: #111; color: white; font-family: Arial; text-align: center; }
    #container { width: 100%; height: 80vh; }
    #status { position: absolute; top: 10px; left: 10px; color: lime; font-size: 18px; }
  </style>
</head>
<body>
  <h1>Тест 3D в Telegram</h1>
  <div id="status">Загрузка...</div>
  <div id="container"></div>

  <script>
    const status = document.getElementById('status');
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    status.innerText = "Проверка THREE...";

    if (typeof THREE === 'undefined') {
      status.innerText = "THREE НЕ загружен!";
      status.style.color = "red";
      return;
    }

    status.innerText = "THREE загружен! Создаём куб...";

    try {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x222222);

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;  // ← простая позиция, кубик должен быть в центре

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight * 0.8);
      document.getElementById('container').appendChild(renderer.domElement);

      // Красный куб — большой, яркий, без света
      const geometry = new THREE.BoxGeometry(3, 3, 3);
      const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
      const cube = new THREE.Mesh(geometry, material);
      scene.add(cube);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      function animate() {
        requestAnimationFrame(animate);
        cube.rotation.x += 0.01;
        cube.rotation.y += 0.01;
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      status.innerText = "Красный кубик должен быть виден! Крути пальцем.";
      status.style.color = "lime";

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight * 0.8);
      });
    } catch (e) {
      status.innerText = "Ошибка: " + e.message;
      status.style.color = "red";
    }
  </script>
</body>
</html>
