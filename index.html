<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Собери свой дом — Scandinavia Home</title>
  <style>
    body { margin: 0; font-family: Arial; background: #f0f7f0; height: 100vh; overflow: hidden; }
    #canvas { 
      width: 100%; 
      height: 68vh; 
      background: linear-gradient(#a5d6a7, #66bb6a); 
      position: relative; 
      border-bottom: 8px solid #2e7d32; 
      box-shadow: inset 0 0 80px rgba(0,0,0,0.2);
    }
    #sidebar { 
      position: absolute; 
      top: 0; 
      right: 0; 
      width: 360px; 
      height: 100vh; 
      background: white; 
      padding: 25px; 
      overflow-y: auto; 
      box-shadow: -8px 0 30px rgba(0,0,0,0.25); 
    }
    h1 { color: #1b5e20; text-align: center; margin: 0 0 20px; font-size: 28px; }
    .module { 
      width: 100%; 
      height: 75px; 
      background: #fff; 
      border: 3px solid #4caf50; 
      margin: 12px 0; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      cursor: grab; 
      border-radius: 14px; 
      font-weight: bold; 
      font-size: 15px;
    }
    button { 
      width: 100%; 
      padding: 14px; 
      margin: 10px 0; 
      border: none; 
      border-radius: 12px; 
      font-size: 16px; 
      cursor: pointer; 
      color: white;
    }
    #price { 
      font-size: 21px; 
      font-weight: bold; 
      background: #e8f5e9; 
      padding: 18px; 
      border-radius: 14px; 
      text-align: center; 
      margin: 20px 0; 
      color: #1b5e20;
    }
  </style>
</head>
<body>
  <div id="canvas"></div>
  <div id="sidebar">
    <h1>Собери свой дом</h1>
    <p style="text-align:center; color:#555;">Перетаскивай модули на участок</p>

    <div class="module" draggable="true" data-area="12">🧱 Стена (+12 м²)</div>
    <div class="module" draggable="true" data-area="8">🏠 Крыша (+8 м²)</div>
    <div class="module" draggable="true" data-area="18">🌳 Терраса (+18 м²)</div>
    <div class="module" draggable="true" data-area="4">🪟 Окно (+4 м²)</div>
    <div class="module" draggable="true" data-area="3">🚪 Дверь (+3 м²)</div>

    <button onclick="changeColor()" style="background:#2196F3;">🎨 Сменить цвет дома</button>
    <button onclick="sendToBot()" style="background:#4CAF50;">Отправить менеджеру</button>

    <div id="price">Площадь: 0 м² | Цена: 0 грн</div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    let totalArea = 0;
    const pricePerM2 = 23500;

    function updatePrice() {
      const totalPrice = Math.round(totalArea * pricePerM2);
      document.getElementById('price').innerText = `Площадь: ${totalArea} м² | Цена: ${totalPrice.toLocaleString()} грн`;
    }

    document.querySelectorAll('.module').forEach(mod => {
      mod.addEventListener('dragstart', e => {
        e.dataTransfer.setData('area', mod.dataset.area);
        e.dataTransfer.setData('name', mod.innerText);
      });
    });

    canvas.addEventListener('dragover', e => e.preventDefault());

    canvas.addEventListener('drop', e => {
      e.preventDefault();
      const area = parseFloat(e.dataTransfer.getData('area'));
      const name = e.dataTransfer.getData('name');

      const item = document.createElement('div');
      item.style.position = 'absolute';
      item.style.left = (e.offsetX - 50) + 'px';
      item.style.top = (e.offsetY - 35) + 'px';
      item.style.width = '100px';
      item.style.height = '70px';
      item.style.border = '4px solid #333';
      item.style.borderRadius = '12px';
      item.style.background = '#fff';
      item.style.display = 'flex';
      item.style.alignItems = 'center';
      item.style.justifyContent = 'center';
      item.style.fontSize = '13px';
      item.style.fontWeight = 'bold';
      item.style.boxShadow = '0 4px 10px rgba(0,0,0,0.3)';
      item.innerText = name;
      canvas.appendChild(item);

      totalArea += area;
      updatePrice();
    });

    function changeColor() {
      const color = '#' + Math.floor(Math.random()*16777215).toString(16);
      document.querySelectorAll('div[draggable]').forEach(div => div.style.background = color);
    }

    function sendToBot() {
      alert(`✅ Дом построен и отправлен менеджеру!\n\nПлощадь: ${totalArea} м²\nЦена: ${Math.round(totalArea * pricePerM2).toLocaleString()} грн`);
    }

    updatePrice();
  </script>
</body>
</html>
