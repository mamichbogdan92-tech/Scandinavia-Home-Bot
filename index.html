<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мой Конструктор Домов — как Planner 5D</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, sans-serif; background:#1e1e1e; color:white; overflow:hidden; height:100vh; }
    
    #topbar {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 60px;
        background: #2a2a2a;
        display: flex;
        align-items: center;
        padding: 0 20px;
        z-index: 200;
        border-bottom: 1px solid #444;
    }
    #logo { font-size: 22px; font-weight: bold; color:#4fc3f7; }
    .tab { padding: 10px 20px; margin: 0 5px; background:#3a3a3a; border-radius: 6px; cursor:pointer; }
    .tab.active { background:#4fc3f7; color:black; }

    #sidebar {
        position: absolute;
        left: 0; top: 60px; bottom: 0;
        width: 280px;
        background: #252525;
        padding: 15px;
        overflow-y: auto;
        border-right: 1px solid #444;
        z-index: 100;
    }
    .category {
        margin: 15px 0;
        background: #333;
        padding: 10px;
        border-radius: 8px;
    }
    .category h3 { margin-bottom: 10px; font-size: 15px; }
    .item {
        width: 70px; height: 70px;
        background: #444;
        margin: 5px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        text-align: center;
    }
    .item:hover { background:#4fc3f7; color:black; }

    #canvasContainer {
        position: absolute;
        left: 280px; top: 60px; right: 0; bottom: 0;
    }

    #rightbar {
        position: absolute;
        right: 0; top: 60px; bottom: 0;
        width: 60px;
        background: #252525;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 20px;
        gap: 15px;
        z-index: 100;
    }
</style>
</head>
<body>

<div id="topbar">
    <div id="logo">🏠 МойДом</div>
    <div style="flex:1"></div>
    <div class="tab active" onclick="switchMode(2)">2D</div>
    <div class="tab" onclick="switchMode(3)">3D</div>
    <div style="flex:1"></div>
    <button style="padding:8px 16px; background:#4fc3f7; color:black; border:none; border-radius:6px;">Сохранить проект</button>
</div>

<div id="sidebar">
    <input type="text" placeholder="Поиск объектов..." style="width:100%; padding:10px; border-radius:8px; border:none; margin-bottom:15px;">
    
    <div class="category">
        <h3>Стены</h3>
        <div class="item" onclick="startWallDrawing()">🧱<br>Стена</div>
    </div>
    
    <div class="category">
        <h3>Проёмы</h3>
        <div class="item" onclick="addElement('window')">🪟<br>Окно</div>
        <div class="item" onclick="addElement('door')">🚪<br>Дверь</div>
    </div>
    
    <div class="category">
        <h3>Мебель</h3>
        <div class="item">🛏️<br>Кровать</div>
        <div class="item">🛋️<br>Диван</div>
        <div class="item">📺<br>ТВ</div>
        <div class="item">🍳<br>Кухня</div>
    </div>
</div>

<div id="rightbar">
    <div style="cursor:pointer;">↔</div>
    <div style="cursor:pointer;">↕</div>
    <div style="cursor:pointer;">⟳</div>
    <div style="cursor:pointer;">🗑️</div>
</div>

<div id="canvasContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/konva@9/konva.min.js"></script>
<script>
// Здесь будет основной код (Konva stage + рисование стен)
const stage = new Konva.Stage({
    container: 'canvasContainer',
    width: window.innerWidth - 340,
    height: window.innerHeight - 60
});

const layer = new Konva.Layer();
stage.add(layer);

let isDrawingWall = false;
let wallStart = null;

function startWallDrawing() {
    isDrawingWall = true;
    alert("Режим рисования стен активирован.\nКликни и тяни мышкой для создания стены.");
}

stage.on('mousedown', function(e) {
    if (!isDrawingWall) return;
    const pos = stage.getPointerPosition();
    wallStart = {x: pos.x, y: pos.y};
});

stage.on('mouseup', function(e) {
    if (!isDrawingWall || !wallStart) return;
    const pos = stage.getPointerPosition();
    
    const wall = new Konva.Line({
        points: [wallStart.x, wallStart.y, pos.x, pos.y],
        stroke: '#888',
        strokeWidth: 18,
        lineCap: 'round',
        lineJoin: 'round'
    });
    
    layer.add(wall);
    layer.draw();
    
    wallStart = null;
    isDrawingWall = false; // можно убрать, если хочешь непрерывное рисование
});

window.addEventListener('resize', () => {
    stage.width(window.innerWidth - 340);
    stage.height(window.innerHeight - 60);
});

alert("Готово!\n\nПока работает только рисование стен линией.\n\nСкажи, что добавить в первую очередь:\n1. Автоопределение комнат + пол\n2. Мебель (перетаскивание)\n3. Переключение в 3D\n4. Измерения в метрах\n5. Левая панель с реальными иконками мебели");

</script>
</body>
</html>
