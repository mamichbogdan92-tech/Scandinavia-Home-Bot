<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Конструктор дома — План этажа</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        overflow: hidden;
    }
    #toolbar {
        position: absolute;
        top: 15px;
        left: 15px;
        background: white;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        z-index: 100;
        width: 260px;
    }
    h2 { margin: 0 0 15px 0; font-size: 20px; }
    button {
        width: 100%;
        padding: 12px;
        margin: 6px 0;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #222;
        color: white;
        cursor: pointer;
    }
    button:hover { background: #444; }
    button.active { background: #0066ff; }

    #canvasContainer {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
    }
    canvas {
        display: block;
    }
    #info {
        position: absolute;
        bottom: 15px;
        left: 15px;
        background: white;
        padding: 10px 15px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        font-size: 14px;
        color: #333;
    }
</style>
</head>
<body>

<div id="toolbar">
    <h2>🏠 Конструктор дома</h2>
    
    <button id="btn-wall" class="active" onclick="setTool('wall')">Добавить стену</button>
    <button id="btn-window" onclick="setTool('window')">Добавить окно</button>
    <button id="btn-door" onclick="setTool('door')">Добавить дверь</button>
    
    <button onclick="clearAll()" style="background:#c00; margin-top:15px;">
        Очистить всё
    </button>
</div>

<div id="info">
    ЛКМ — добавить / переместить<br>
    Зажать + двигать — перемещать элемент<br>
    Колёсико мыши — масштаб
</div>

<div id="canvasContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/konva@9/konva.min.js"></script>
<script>
// ====================== Основные настройки ======================
const width = window.innerWidth;
const height = window.innerHeight;

const stage = new Konva.Stage({
    container: 'canvasContainer',
    width: width,
    height: height
});

const layer = new Konva.Layer();
stage.add(layer);

let currentTool = 'wall';
let selectedElement = null;
let isDragging = false;

// ====================== Функции ======================
function setTool(tool) {
    currentTool = tool;
    document.querySelectorAll('#toolbar button').forEach(btn => {
        btn.classList.remove('active');
        if (btn.id === `btn-${tool}`) btn.classList.add('active');
    });
}

function addWall(x, y) {
    const wall = new Konva.Rect({
        x: x,
        y: y,
        width: 200,
        height: 12,
        fill: '#555',
        stroke: '#333',
        strokeWidth: 2,
        draggable: true,
        cornerRadius: 2,
        rotation: 0
    });
    
    wall.userData = { type: 'wall' };
    
    wall.on('click', () => selectElement(wall));
    layer.add(wall);
    layer.draw();
}

function addWindow(x, y) {
    const win = new Konva.Rect({
        x: x,
        y: y,
        width: 80,
        height: 12,
        fill: '#88ccff',
        stroke: '#0066aa',
        strokeWidth: 3,
        draggable: true,
        rotation: 0
    });
    win.userData = { type: 'window' };
    win.on('click', () => selectElement(win));
    layer.add(win);
    layer.draw();
}

function addDoor(x, y) {
    const door = new Konva.Rect({
        x: x,
        y: y,
        width: 40,
        height: 12,
        fill: '#8B5A2B',
        stroke: '#5c3a1f',
        strokeWidth: 3,
        draggable: true,
        rotation: 0
    });
    door.userData = { type: 'door' };
    door.on('click', () => selectElement(door));
    layer.add(door);
    layer.draw();
}

function selectElement(element) {
    if (selectedElement) {
        selectedElement.strokeWidth(2);
        selectedElement.stroke('#333');
    }
    selectedElement = element;
    element.stroke('#0066ff');
    element.strokeWidth(4);
    layer.draw();
}

// ====================== События ======================
stage.on('click', function(e) {
    if (e.target === stage) {  // клик по пустому месту
        const pos = stage.getPointerPosition();
        
        if (currentTool === 'wall') addWall(pos.x - 100, pos.y - 6);
        else if (currentTool === 'window') addWindow(pos.x - 40, pos.y - 6);
        else if (currentTool === 'door') addDoor(pos.x - 20, pos.y - 6);
    }
});

// Перемещение уже встроено в draggable

// Масштаб колёсиком
stage.on('wheel', (e) => {
    e.evt.preventDefault();
    
    const oldScale = stage.scaleX();
    const pointer = stage.getPointerPosition();
    
    const mousePointTo = {
        x: (pointer.x - stage.x()) / oldScale,
        y: (pointer.y - stage.y()) / oldScale
    };
    
    const newScale = e.evt.deltaY > 0 ? oldScale * 0.9 : oldScale * 1.1;
    stage.scale({ x: newScale, y: newScale });
    
    const newPos = {
        x: pointer.x - mousePointTo.x * newScale,
        y: pointer.y - mousePointTo.y * newScale
    };
    stage.position(newPos);
    stage.draw();
});

function clearAll() {
    if (confirm('Очистить весь план?')) {
        layer.destroyChildren();
        layer.draw();
    }
}

// Адаптация под размер окна
window.addEventListener('resize', () => {
    stage.width(window.innerWidth);
    stage.height(window.innerHeight);
    stage.draw();
});

// ====================== Запуск ======================
setTool('wall');

// Добавим пару примеров стен, чтобы сразу было видно, как выглядит
setTimeout(() => {
    addWall(300, 200);
    addWall(500, 200);
    addWall(300, 400);
    addWall(500, 400);
    
    addWindow(380, 195);
    addDoor(520, 395);
}, 300);

</script>
</body>
</html>
