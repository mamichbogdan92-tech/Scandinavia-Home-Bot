<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Scandi Home 3D</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="three.min.js"></script>
  <script src="OrbitControls.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial; background: #f0f0f0; height: 100vh; overflow: hidden; text-align: center; }
    #container { width: 100%; height: 70vh; background: #e0f7fa; }
    h1 { margin: 10px 0 5px; color: #333; }
    p { margin: 0 0 15px; color: #555; }
    button { padding: 12px 24px; font-size: 16px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; color: white; }
    #changeColor { background: #2196F3; }
    #sendConfig { background: #4CAF50; }
  </style>
</head>
<body>
  <h1>Собери свой дом 🏠</h1>
  <p>Крути кубик пальцем/мышкой. Это прототип!</p>
  <div id="container"></div>
  <div>
    <button id="changeColor">Сменить цвет дома</button>
    <button id="sendConfig">Готово — отправить менеджеру</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.MainButton.setText("Отправить конфиг");
    tg.MainButton.show();

    // THREE теперь локальный — ошибки загрузки не будет
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe0f7fa);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight * 0.7);
    document.getElementById('container').appendChild(renderer.domElement);

    const geometry = new THREE.BoxGeometry(2, 2, 2);
    let material = new THREE.MeshStandardMaterial({ color: 0xff9800 });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    scene.add(new THREE.DirectionalLight(0xffffff, 1).position.set(5,5,5));
    scene.add(new THREE.AmbientLight(0x404040));

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    function animate() {
      requestAnimationFrame(animate);
      cube.rotation.y += 0.005;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    document.getElementById('changeColor').onclick = () => {
      material.color.set(Math.random() * 0xffffff);
    };

    document.getElementById('sendConfig').onclick = () => {
      tg.sendData("Дом готов! Цвет: #" + material.color.getHexString() + ", Площадь ~50 м²");
      tg.close();
    };

    tg.MainButton.onClick(() => {
      tg.sendData("Конфиг отправлен!");
    });
  </script>
</body>
</html>
