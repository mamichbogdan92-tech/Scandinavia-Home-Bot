<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Собери свой дом</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="three.min.js"></script>
  <script src="OrbitControls.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial; background: #f0f0f0; height: 100vh; overflow: hidden; text-align: center; }
    #container { width: 100%; height: 50vh; background: #e0f7fa; position: relative; }
    #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 20px; font-weight: bold; max-width: 90%; }
    h1 { margin: 10px 0 5px; color: #333; }
    p { margin: 0 0 10px; color: #555; }
  </style>
</head>
<body>
  <h1>Собери свой дом 🏠</h1>
  <p>Если дом не появился — напиши, что в статусе ниже</p>
  <div id="container">
    <div id="status">Загрузка 3D...</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const status = document.getElementById('status');
    status.innerText = "Проверка THREE...";

    if (typeof THREE === 'undefined') {
      status.innerText = "THREE не загрузился";
      return;
    }

    status.innerText = "THREE есть! Создаём сцену...";

    try {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xe0f7fa);

      const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 10);  // ← максимально простая позиция — прямо по центру Z

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight * 0.5);
      document.getElementById('container').appendChild(renderer.domElement);

      // Большой красный куб прямо в центре — чтобы точно увидеть, работает ли рендер вообще
      const geometry = new THREE.BoxGeometry(4, 4, 4);
      const material = new THREE.MeshBasicMaterial({ color: 0xff0000 }); // красный, без света
      const cube = new THREE.Mesh(geometry, material);
      scene.add(cube);

      // Свет не нужен — используем BasicMaterial
      // const light = new THREE.AmbientLight(0xffffff, 1);
      // scene.add(light);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      function animate() {
        requestAnimationFrame(animate);
        cube.rotation.x += 0.01;
        cube.rotation.y += 0.01;
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      status.innerText = "Рендер запущен! Должен быть красный кубик.";
      status.style.color = "green";

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight * 0.5);
      });
    } catch (e) {
      status.innerText = "Критическая ошибка: " + e.message;
      status.style.color = "red";
    }
  </script>
</body>
</html>
