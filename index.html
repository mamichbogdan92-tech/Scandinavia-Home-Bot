<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Симулятор постройки дома — Scandinavia Home</title>
  <style>
    body { margin: 0; font-family: Arial; background: #f0f0f0; height: 100vh; overflow: hidden; }
    #canvas { width: 100%; height: 70vh; background: #a5d6a7; position: relative; border: 5px solid #2e7d32; }
    #sidebar { position: absolute; top: 0; right: 0; width: 360px; height: 100vh; background: white; padding: 20px; overflow-y: auto; box-shadow: -6px 0 30px rgba(0,0,0,0.25); }
    .module { width: 100%; height: 70px; background: #fff; border: 3px solid #4caf50; margin: 10px 0; display: flex; align-items: center; justify-content: center; cursor: grab; border-radius: 12px; font-weight: bold; }
    button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; cursor: pointer; color: white; }
    #price { font-size: 21px; font-weight: bold; background: #e8f5e9; padding: 18px; border-radius: 14px; text-align: center; margin: 20px 0; color: #1b5e20; }
    h1 { color: #1b5e20; text-align: center; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="sidebar">
    <h1>Симулятор постройки дома</h1>
    <p>Перетаскивай модули — дом будет строиться</p>

    <div class="module" draggable="true" data-type="wall">🧱 Стена</div>
    <div class="module" draggable="true" data-type="roof">🏠 Крыша</div>
    <div class="module" draggable="true" data-type="terrace">🌳 Терраса</div>
    <div class="module" draggable="true" data-type="window">🪟 Окно</div>
    <div class="module" draggable="true" data-type="door">🚪 Дверь</div>

    <button onclick="changeColor()" style="background:#2196F3;">🎨 Сменить цвет дома</button>
    <button onclick="sendToBot()" style="background:#4CAF50;">Отправить менеджеру</button>

    <div id="price">Площадь: 50 м² | Цена: 1 150 000 грн</div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.7;

    let wallsHeight = 180;
    let hasRoof = false;
    let hasTerrace = false;
    let hasWindows = 0;
    let hasDoors = 0;
    let totalArea = 50;

    function drawHouse() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Земля
      ctx.fillStyle = '#4caf50';
      ctx.fillRect(0, canvas.height - 60, canvas.width, 60);

      // Стены (белые)
      ctx.fillStyle = '#f5f5f5';
      ctx.fillRect(canvas.width * 0.25, canvas.height - wallsHeight - 60, canvas.width * 0.5, wallsHeight);

      // Окна
      ctx.fillStyle = '#87ceeb';
      for (let i = 0; i < hasWindows; i++) {
        ctx.fillRect(canvas.width * 0.32 + i * 70, canvas.height - wallsHeight + 40, 45, 45);
      }

      // Дверь
      if (hasDoors > 0) {
        ctx.fillStyle = '#5d4037';
        ctx.fillRect(canvas.width * 0.45, canvas.height - wallsHeight + 30, 40, 80);
      }

      // Крыша
      if (hasRoof) {
        ctx.fillStyle = '#b22222';
        ctx.beginPath();
        ctx.moveTo(canvas.width * 0.25, canvas.height - wallsHeight - 60);
        ctx.lineTo(canvas.width * 0.5, canvas.height - wallsHeight - 160);
        ctx.lineTo(canvas.width * 0.75, canvas.height - wallsHeight - 60);
        ctx.fill();
      }

      // Терраса
      if (hasTerrace) {
        ctx.fillStyle = '#8b4513';
        ctx.fillRect(canvas.width * 0.2, canvas.height - 70, canvas.width * 0.6, 20);
      }

      updatePrice();
    }

    function updatePrice() {
      const totalPrice = Math.round(totalArea * 23500);
      document.getElementById('price').innerText = `Площадь: ${totalArea} м² | Цена: ${totalPrice.toLocaleString()} грн`;
    }

    document.querySelectorAll('.module').forEach(mod => {
      mod.addEventListener('dragstart', e => {
        e.dataTransfer.setData('type', mod.dataset.type);
      });
    });

    canvas.addEventListener('drop', e => {
      e.preventDefault();
      const type = e.dataTransfer.getData('type');

      if (type === 'wall') { totalArea += 12; wallsHeight += 50; }
      if (type === 'roof') { hasRoof = true; totalArea += 8; }
      if (type === 'terrace') { hasTerrace = true; totalArea += 18; }
      if (type === 'window') { hasWindows++; totalArea += 4; }
      if (type === 'door') { hasDoors++; totalArea += 3; }

      drawHouse();
    });

    canvas.addEventListener('dragover', e => e.preventDefault());

    function changeColor() {
      const colors = ['#f5f5f5', '#a5d6a7', '#b0bec5', '#ffccbc'];
      ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
      drawHouse();
    }

    function sendToBot() {
      alert(`✅ Дом построен!\nПлощадь: ${totalArea} м²\nЦена: ${Math.round(totalArea * 23500).toLocaleString()} грн`);
    }

    drawHouse();
  </script>
</body>
</html>
