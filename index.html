<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<title>Конструктор дома</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Конструктор дома</h1>

<div class="builder">

<div class="left">

<img id="houseImage" src="images/barnhouse.jpg">

</div>

<div class="right">

<label>Модель дома</label>

<select id="modelSelect"></select>

<label>Площадь (м²)</label>

<input type="range" min="50" max="200" value="100" id="areaRange">
<div id="areaValue">100 м²</div>

<label>Фасад</label>

<select id="facade">
<option value="0">Стандарт</option>
<option value="80000">Премиум</option>
</select>

<label>Терраса</label>

<select id="terrace">
<option value="0">Нет</option>
<option value="120000">Есть</option>
</select>

<div class="price">

Цена: <span id="price">0</span> грн

</div>

<button id="orderBtn">
Отправить заявку
</button>

</div>

</div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
