<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>3D Конструктор дома</title>
<style>
    body { margin:0; overflow:hidden; font-family:Arial, sans-serif; background:#f0f0f0; }
    #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: 280px;
        z-index: 100;
    }
    button {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        background: #222;
        color: white;
    }
    button:hover { background: #444; }
    button.active { background: #0066ff; }
    .price {
        font-size: 24px;
        font-weight: bold;
        margin-top: 20px;
        color: #0066ff;
    }
    #instructions {
        margin-top: 15px;
        font-size: 14px;
        color: #666;
    }
</style>
</head>
<body>
<div id="ui">
    <h3>🏠 Конструктор дома</h3>
    
    <button id="btn-wall" onclick="setMode('wall')">Добавить стену</button>
    <button id="btn-window" onclick="setMode('window')">Добавить окно</button>
    <button id="btn-door" onclick="setMode('door')">Добавить дверь</button>
    
    <div class="price">
        Цена: <span id="price">0</span> грн
    </div>
    
    <div id="instructions">
        Кликните на пол, чтобы добавить объект<br>
        Зажмите левую кнопку мыши на объекте — перемещать
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ==================== Основные переменные ====================
let scene, camera, renderer, controls;
let currentMode = 'wall';
let price = 0;
const prices = { wall: 15000, window: 8000, door: 12000 };

let selectedObject = null;
let isDragging = false;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

const objects = []; // все добавленные объекты

// ==================== Инициализация Three.js ====================
function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe0e0e0);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(15, 15, 15);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Освещение
    const ambient = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(20, 30, 10);
    scene.add(dirLight);

    // Пол
    const floorGeo = new THREE.PlaneGeometry(50, 50);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, side: THREE.DoubleSide });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.01;
    scene.add(floor);

    // Сетка
    const grid = new THREE.GridHelper(50, 50, 0x888888, 0xcccccc);
    scene.add(grid);

    // События
    window.addEventListener('resize', onWindowResize);
    renderer.domElement.addEventListener('click', onClick);
    renderer.domElement.addEventListener('pointerdown', onPointerDown);
    renderer.domElement.addEventListener('pointermove', onPointerMove);
    renderer.domElement.addEventListener('pointerup', onPointerUp);

    animate();
}

// ==================== Режимы ====================
function setMode(mode) {
    currentMode = mode;
    
    document.querySelectorAll('#ui button').forEach(btn => {
        btn.classList.remove('active');
        if (btn.id === `btn-${mode}`) btn.classList.add('active');
    });
}

// ==================== Добавление объектов ====================
function addObjectAt(position) {
    let geometry, material, height, yPos;
    
    if (currentMode === 'wall') {
        geometry = new THREE.BoxGeometry(4, 3, 0.3);
        material = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
        height = 3;
        yPos = 1.5;
    } 
    else if (currentMode === 'window') {
        geometry = new THREE.BoxGeometry(1.4, 1.4, 0.15);
        material = new THREE.MeshStandardMaterial({ color: 0x88ccff });
        height = 1.4;
        yPos = 1.4;
    } 
    else if (currentMode === 'door') {
        geometry = new THREE.BoxGeometry(1.1, 2.2, 0.15);
        material = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
        height = 2.2;
        yPos = 1.1;
    }

    const mesh = new THREE.Mesh(geometry, material);
    
    // Привязка к сетке (snap to grid)
    mesh.position.set(
        Math.round(position.x),
        yPos,
        Math.round(position.z)
    );
    
    mesh.userData = { type: currentMode, price: prices[currentMode] };
    
    scene.add(mesh);
    objects.push(mesh);
    
    price += prices[currentMode];
    document.getElementById('price').innerText = price.toLocaleString('ru-RU');
    
    return mesh;
}

// ==================== Обработка кликов ====================
function onClick(event) {
    if (isDragging) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(scene.children);

    for (let intersect of intersects) {
        if (intersect.object.geometry.type === 'PlaneGeometry') { // клик по полу
            addObjectAt(intersect.point);
            return;
        }
    }
}

// ==================== Перемещение объектов ====================
function onPointerDown(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(objects);

    if (intersects.length > 0) {
        selectedObject = intersects[0].object;
        isDragging = true;
        controls.enabled = false; // отключаем orbit пока тянем
    }
}

function onPointerMove(event) {
    if (!isDragging || !selectedObject) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(scene.children);

    for (let intersect of intersects) {
        if (intersect.object.geometry.type === 'PlaneGeometry') {
            selectedObject.position.x = Math.round(intersect.point.x);
            selectedObject.position.z = Math.round(intersect.point.z);
            return;
        }
    }
}

function onPointerUp() {
    isDragging = false;
    controls.enabled = true;
    selectedObject = null;
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// ==================== Анимация ====================
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

// Запуск
init();
setMode('wall'); // по умолчанию стена
</script>
</body>
</html>
